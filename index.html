<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>nes draw</title>
<meta name="description" content="nes draw — a NES graphics maker in your browser.">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta property="og:type" content="website">

<meta property="og:title" content="nes draw — NES graphics maker">
<meta property="og:description" content="Make NES graphics in your browser.">

<meta property="og:image" content="https://djessemann.github.io/nes-draw/og.png">

<style>
  :root {
    --bg: #000000; --ink: #ffffff; --line: #ffffff; --muted: #999999; --soft: #666666;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }
  .app { max-width: 640px; margin: 0 auto; padding: 0 12px 48px; }

  header {
    position: sticky; top: 0; z-index: 10; background: var(--bg);
    display: flex; align-items: center; gap: 10px; padding: 14px 2px 12px;
    border-bottom: 1px solid var(--line); margin-bottom: 14px;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: .5px; }
  .hdr-actions { margin-left: auto; display: flex; gap: 8px; }
  .howto-link { color: var(--ink); background: var(--bg); text-decoration: none; font-size: 12px;
                border: 1px solid var(--line); padding: 7px 11px; cursor: pointer; }

  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
       margin: 18px 0 8px; font-weight: 700; }

  button, select, input {
    font: inherit; color: var(--ink); background: var(--bg);
    border: 1px solid var(--line); border-radius: 0; padding: 9px 11px; cursor: pointer;
  }
  button:active { background: #222; }
  button.on { background: var(--ink); color: #000; border-color: var(--ink); font-weight: 700; }
  input[type=number] { width: 54px; text-align: center; }
  #pxStat { display: inline-block; width: 54px; text-align: left; }
  #playBtn { width: 92px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; }
  #playBtn svg { width: 14px; height: 14px; display: block; }

  /* Canvas */
  .stage { display: flex; justify-content: center; padding: 8px 0;
    background: repeating-conic-gradient(#fff 0% 25%, #efefef 0% 50%) 50% / 22px 22px;
    border: 1px solid var(--line); touch-action: none; }
  canvas#canvas { image-rendering: pixelated; touch-action: none; display: block; max-width: 100%; height: auto; }

  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .grid4.two { grid-template-columns: repeat(2, 1fr); } /* arrange: just clear + undo */
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

  /* Tools */
  .tools { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .tools.two { grid-template-columns: repeat(2, 1fr); } /* arrange: only place + erase */
  .tools button { display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 11px 4px; font-size: 12px; }
  .tools button .ico { font-size: 20px; }
  .tools button .ico svg { width: 22px; height: 22px; display: block; }

  /* Sub-palette */
  .slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .slot { height: 48px; border: 1px solid var(--line); position: relative;
          display: flex; align-items: flex-end; justify-content: center; cursor: pointer; }
  .slot.on { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--ink); }
  .slot .idx { position: absolute; top: 3px; left: 5px; font-size: 11px; font-weight: 800; color: #000;
               background: rgba(255,255,255,.7); padding: 0 2px; }
  .slot .hex { font-size: 10px; padding: 1px 4px; background: rgba(255,255,255,.85); color: #000;
               margin-bottom: 4px; border: 1px solid var(--soft); }
  .checker { background-image:
      linear-gradient(45deg,#ddd 25%,transparent 25%), linear-gradient(-45deg,#ddd 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#ddd 75%), linear-gradient(-45deg,transparent 75%,#ddd 75%);
      background-size: 14px 14px; background-position: 0 0,0 7px,7px -7px,-7px 0; background-color:#fff; }

  /* NES palette */
  .nes-pal { display: grid; grid-template-columns: repeat(13, 1fr); gap: 3px; margin-top: 12px; }
  .nes-pal .c { aspect-ratio: 1; cursor: pointer; border: 1px solid var(--soft); }
  .nes-pal .c.sel { border-color: var(--ink); box-shadow: 0 0 0 2px var(--ink); }

  /* Frames */
  .frames { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
  .frame { flex: 0 0 auto; border: 1px solid var(--line); background: var(--bg);
           padding: 5px; cursor: pointer; text-align: center; }
  .frame.on { box-shadow: 0 0 0 2px var(--ink); }
  .frame canvas { width: 56px; height: 56px; display: block;
      background: repeating-conic-gradient(#fff 0% 25%, #efefef 0% 50%) 50% / 10px 10px; }
  .frame small { color: var(--muted); font-size: 10px; }

  .preview-wrap { display: flex; align-items: center; gap: 14px; }
  .preview-wrap canvas { width: 80px; height: 80px; image-rendering: pixelated; border: 1px solid var(--line);
      background: repeating-conic-gradient(#fff 0% 25%, #efefef 0% 50%) 50% / 10px 10px; }

  label.tog { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; color: var(--muted); }
  label.tog input[type=checkbox] {
    appearance: none; -webkit-appearance: none; width: 18px; height: 18px; margin: 0; padding: 0;
    border: 1px solid var(--line); background: var(--bg); border-radius: 0; position: relative; cursor: pointer; flex: none; }
  label.tog input[type=checkbox]:checked { background: var(--ink); }
  label.tog input[type=checkbox]:checked::after {
    content: ""; position: absolute; left: 5px; top: 1px; width: 4px; height: 9px;
    border: solid #000; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .stat { color: var(--muted); font-size: 12px; }
  .sectionbox { background: var(--bg); border: 1px solid var(--line); padding: 12px; margin-top: 10px; }

  /* sprite/tile + draw/arrange segmented toggles — same 1px borders + inverted active as the app */
  .modeseg, .viewseg { display: inline-flex; }
  .modeseg button, .viewseg button { border-radius: 0; }
  .modeseg button + button, .viewseg button + button { border-left-width: 0; }
  .modeseg button { font-size: 12px; padding: 7px 14px; letter-spacing: .5px; }
  .viewseg button { font-size: 13px; padding: 8px 16px; letter-spacing: .5px; }
  .subrow { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  .subrow .mapsize { color: var(--muted); font-size: 12px; margin-left: auto; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .subrow .mapsize input { width: 46px; }
  .navrow { display: flex; align-items: center; gap: 6px; }
  .navrow button { padding: 7px 12px; font-size: 13px; }
  .navrow .pos { color: var(--muted); font-size: 12px; min-width: 40px; text-align: center; }
  .slots.four { grid-template-columns: repeat(4, 1fr); }
  .slot .tag { position: absolute; top: 3px; right: 5px; font-size: 9px; font-weight: 800; color: #000;
               background: rgba(255,255,255,.7); padding: 0 3px; letter-spacing: .5px; }

  /* In-app modal (confirm) — matches the dark, high-contrast, square UI */
  .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.72);
    display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay[hidden] { display: none; }
  .modal { background: var(--bg); border: 1px solid var(--line); width: 100%; max-width: 360px; padding: 18px; }
  .modal-msg { margin: 0 0 16px; color: var(--ink); line-height: 1.5; }
  .modal-input { display: block; width: 100%; box-sizing: border-box; margin: 0 0 16px; padding: 9px 10px;
    background: var(--bg); color: var(--ink); border: 1px solid var(--line); border-radius: 0;
    font-family: inherit; font-size: 16px; } /* 16px so iOS doesn't zoom on focus */
  .modal-input::placeholder { color: var(--muted); }
  .modal-input[hidden] { display: none; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
  .modal-actions button { font-size: 13px; padding: 9px 16px; }

  /* Layout wrappers are invisible on mobile/tablet (display:contents = no effect);
     they only become a two-column grid on desktop, where there's room for it. */
  .layout, .left, .right { display: contents; }
  @media (min-width: 1100px) {
    .app { max-width: 1120px; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 380px; gap: 24px; align-items: start; }
    .left { display: block; position: sticky; top: 64px; }
    .right { display: block; }
    .right > h2:first-child { margin-top: 0; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="modeseg" id="modeSeg">
      <button data-mode="sprite" class="on">sprite</button>
      <button data-mode="tile">tile</button>
    </div>
    <div class="hdr-actions">
      <button id="newProject" class="howto-link">new</button>
      <a href="how-to.html" class="howto-link">how to</a>
    </div>
  </header>

  <div class="layout">
  <div class="left">
  <!-- TILE VIEW SWITCH (tile mode only): edit one tile, or arrange tiles into a grid -->
  <div class="subrow" id="subRow" style="display:none">
    <div class="viewseg" id="viewSeg">
      <button data-view="draw" class="on">draw</button>
      <button data-view="arrange">arrange</button>
    </div>
    <div class="viewseg" id="mapViewSeg" style="display:none">
      <button data-mapview="screen" class="on">screen</button>
      <button data-mapview="world">world</button>
    </div>
    <span class="mapsize" id="mapSize" style="display:none">screen
      <input type="number" id="mapW" min="1" max="32" value="8"> ×
      <input type="number" id="mapH" min="1" max="32" value="8">
      world
      <input type="number" id="worldW" min="1" max="16" value="1"> ×
      <input type="number" id="worldH" min="1" max="16" value="1">
    </span>
  </div>
  <!-- CANVAS -->
  <div class="stage" id="stage"><canvas id="canvas"></canvas></div>
  <div class="row" style="justify-content:space-between;margin-top:6px">
    <div class="navrow" id="navRow" style="display:none">
      <button id="navL">◀</button><button id="navR">▶</button><button id="navU">▲</button><button id="navD">▼</button>
      <span class="pos" id="navPos">1,1</span>
    </div>
    <label class="tog" style="margin-left:auto"><input type="checkbox" id="gridChk" checked> grid</label>
  </div>
  </div>

  <div class="right">
  <!-- TOOLS -->
  <h2>Tools</h2>
  <div class="tools">
    <button class="tool on" data-tool="pencil"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/><path d="m14.5 5.5 3 3"/></svg></span>pencil</button>
    <button class="tool" data-tool="eraser"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 20-3.7-3.7a2 2 0 0 1 0-2.8l8.4-8.4a2 2 0 0 1 2.8 0l4.9 4.9a2 2 0 0 1 0 2.8L13 20Z"/><path d="M20 20H8"/><path d="m6 13 5 5"/></svg></span>eraser</button>
    <button class="tool" data-tool="fill"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m11 4 7.5 7.5-6.6 6.6a2 2 0 0 1-2.8 0l-4.7-4.7a2 2 0 0 1 0-2.8Z"/><path d="m8 7 3 3"/><path d="M4.4 13.5h13.2"/><path d="M20.5 20a1.6 1.6 0 0 1-3.2 0c0-1.3 1.6-3.2 1.6-3.2s1.6 1.9 1.6 3.2Z"/></svg></span>fill</button>
    <button class="tool" data-tool="lasso"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="9" rx="8.5" ry="5.5" stroke-dasharray="0.1 3.4"/><path d="M6.7 13.6c-1.5 1.3-1.4 3.4.5 4.2"/><circle cx="8.4" cy="19.4" r="1.6"/></svg></span>lasso</button>
  </div>
  <div class="grid4" id="editRow" style="margin-top:8px">
    <button id="flipH">↔ flip</button>
    <button id="flipV">↕ flip</button>
    <button id="clearFrame">clear</button>
    <button id="undoBtn">↶ undo</button>
  </div>

  <!-- COLORS -->
  <h2 id="colorsHead">Colors</h2>
  <div class="slots" id="slots"></div>
  <div class="nes-pal" id="nesPal"></div>

  <!-- FRAMES -->
  <h2 id="framesHead">Frames &amp; animation</h2>
  <div class="preview-wrap" id="previewWrap">
    <canvas id="preview"></canvas>
    <div class="row">
      <button id="playBtn"></button>
      <label class="stat">fps <input type="number" id="fps" min="1" max="60" value="8"></label>
    </div>
  </div>
  <div class="frames" id="frames" style="margin-top:10px"></div>
  <div class="grid4" style="margin-top:8px;grid-template-columns:repeat(3,1fr)">
    <button id="addFrame">+ add</button>
    <button id="dupFrame">duplicate</button>
    <button id="delFrame">delete</button>
  </div>

  <!-- SIZE + EXPORT -->
  <div class="sectionbox">
    <div class="row">
      <span>size:</span>
      <input type="number" id="tilesW" min="1" max="8" value="2"> ×
      <input type="number" id="tilesH" min="1" max="8" value="2">
      <span class="stat" id="pxStat">16×16</span>
      <button id="applySize">resize</button>
    </div>
  </div>
  <div class="grid2" style="margin-top:10px">
    <button id="saveJson">save</button>
    <button id="loadJson">load</button>
  </div>
  <div class="grid3" style="margin-top:8px">
    <button id="exportAsm">6502</button>
    <button id="exportPng">png</button>
    <button id="exportGif">gif</button>
    <button id="exportMap" style="display:none">map</button>
  </div>
  <input type="file" id="fileInput" accept=".json" style="display:none">
  </div>
  </div>
</div>

<!-- In-app confirm dialog (replaces the native confirm), styled like the rest of the UI -->
<div class="modal-overlay" id="modal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalMsg">
    <p class="modal-msg" id="modalMsg"></p>
    <input class="modal-input" id="modalInput" type="text" maxlength="40" autocomplete="off" autocapitalize="off" spellcheck="false" hidden>
    <div class="modal-actions">
      <button id="modalCancel" class="howto-link">cancel</button>
      <button id="modalOk" class="howto-link on">ok</button>
    </div>
  </div>
</div>

<script>
/* nes-draw — single-file, offline, mobile-friendly NES sprite & map editor.
   The 2.0 line of nesprite; project format "nes-sprite-editor-v1" is shared with nesprite 1.0
   (this app adds map.worldW/worldH, which 1.0 safely ignores). */

const NES_PALETTE = [
  "#7C7C7C","#0000FC","#0000BC","#4428BC","#940084","#A80020","#A81000","#881400",
  "#503000","#007800","#006800","#005800","#004058","#000000","#000000","#000000",
  "#BCBCBC","#0078F8","#0058F8","#6844FC","#D800CC","#E40058","#F83800","#E45C10",
  "#AC7C00","#00B800","#00A800","#00A844","#008888","#000000","#000000","#000000",
  "#F8F8F8","#3CBCFC","#6888FC","#9878F8","#F878F8","#F85898","#F87858","#FCA044",
  "#F8B800","#B8F818","#58D854","#58F898","#00E8D8","#787878","#000000","#000000",
  "#FCFCFC","#A4E4FC","#B8B8F8","#D8B8F8","#F8B8F8","#F8A4C0","#F0D0B0","#FCE0A8",
  "#F8D878","#D8F878","#B8F8B8","#B8F8D8","#00FCFC","#F8D8F8","#000000","#000000"
];

const state = {
  tilesW: 2, tilesH: 2,
  palette: [0x0F, 0x16, 0x2A, 0x30],
  frames: [], current: 0,
  activeSlot: 1, tool: "pencil",
  cell: 20, showGrid: true, fps: 8,
  undo: [],
  // sprite vs background tile mode (see CLAUDE.md). tileView: edit one tile ("draw")
  // or stamp tiles into a grid to preview them together ("arrange").
  mode: "sprite", tileView: "draw",
  // arrange grid: w,h = cells per screen; worldW,worldH = the world in screens; cells spans
  // the WHOLE world row-major (each cell a tile/frame index, -1 = empty/backdrop)
  map: { w: 8, h: 8, worldW: 1, worldH: 1, cells: [] },
  mapView: "screen", curScreen: { x: 0, y: 0 }, // arrange zoom (screen|world) + the open screen
  // sprite art and tile art are independent workspaces. The active one lives in the fields above;
  // the inactive one is stashed here and swapped in on mode toggle. Both are saved to the project.
  docs: { sprite: null, tile: null },
};
// Arrange just places/erases tiles; flipping is done in tile-draw mode (mirrors the real pixels).
// A few saves briefly packed flip bits into cells — mask them off so the tile index still resolves.
const cellTile = v => v & 0x3FFF;
const W = () => state.tilesW * 8;
const H = () => state.tilesH * 8;
const isTile = () => state.mode === "tile";
const isArrange = () => isTile() && state.tileView === "arrange";
const isWorld = () => isArrange() && state.mapView === "world";
const multiScreen = () => state.map.worldW > 1 || state.map.worldH > 1;
const totW = () => state.map.w * state.map.worldW; // whole-world size in cells
const totH = () => state.map.h * state.map.worldH;
const viewW = () => isWorld() ? totW() : state.map.w; // cells shown on the arrange canvas
const viewH = () => isWorld() ? totH() : state.map.h;
const viewOX = () => isWorld() ? 0 : state.curScreen.x * state.map.w; // view origin in world cells
const viewOY = () => isWorld() ? 0 : state.curScreen.y * state.map.h;
const backdropColor = () => NES_PALETTE[state.palette[0]]; // slot 0 = drawn backdrop in tile mode
const logW = () => isArrange() ? viewW() * W() : W();
const logH = () => isArrange() ? viewH() * H() : H();
function clampScreen() {
  state.curScreen.x = Math.max(0, Math.min(state.curScreen.x, state.map.worldW - 1));
  state.curScreen.y = Math.max(0, Math.min(state.curScreen.y, state.map.worldH - 1));
}
function resizeMap(nw, nh, nww, nwh) { // content is kept by whole-world cell position
  const oc = state.map.cells || [], ow = totW(), oh = totH();
  const tw = nw * nww, th = nh * nwh, nc = new Array(tw * th).fill(-1);
  for (let y = 0; y < Math.min(th, oh); y++) for (let x = 0; x < Math.min(tw, ow); x++) { const v = oc[y * ow + x]; if (v != null) nc[y * tw + x] = v; }
  state.map = { w: nw, h: nh, worldW: nww, worldH: nwh, cells: nc };
  clampScreen();
}
function ensureMap() {
  state.map.worldW = state.map.worldW || 1; state.map.worldH = state.map.worldH || 1;
  if (!state.map.cells || state.map.cells.length !== totW() * totH()) resizeMap(state.map.w, state.map.h, state.map.worldW, state.map.worldH);
}
// keep arrange-grid tile references valid when the tileset changes
function remapInsert(p) { const c = state.map.cells; if (!c) return; for (let i = 0; i < c.length; i++) { if (c[i] < 0) continue; const t = cellTile(c[i]); c[i] = t >= p ? t + 1 : t; } }
function remapDelete(d) { const c = state.map.cells; if (!c) return; for (let i = 0; i < c.length; i++) { if (c[i] < 0) continue; const t = cellTile(c[i]); c[i] = t === d ? -1 : (t > d ? t - 1 : t); } }
function blankFrame(name) { return { name, px: new Uint8Array(W() * H()) }; }

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");
const pctx = preview.getContext("2d");

// ---- Sizing: auto-fit canvas to the column width ----
function fitCanvas() {
  const stage = canvas.parentElement;
  const avail = stage.clientWidth - 16; // minus stage padding
  let cell = Math.floor(avail / logW());
  cell = Math.max(1, Math.min(cell, 48));
  state.cell = cell;
  render();
}
window.addEventListener("resize", fitCanvas);

// ---- Rendering ----
function drawChecker(c, w, h, size) {
  for (let y = 0; y < h; y += size)
    for (let x = 0; x < w; x += size) {
      c.fillStyle = ((x / size + y / size) & 1) ? "#eaeaea" : "#ffffff";
      c.fillRect(x, y, size, size);
    }
}
function paintPixels(c, px, w, h, z, ox = 0, oy = 0) {
  for (let y = 0; y < h; y++)
    for (let x = 0; x < w; x++) {
      const v = px[y * w + x];
      if (v === 0) continue;
      c.fillStyle = NES_PALETTE[state.palette[v]];
      c.fillRect(ox + x * z, oy + y * z, z, z);
    }
}
// ---- Lasso selection (freeform select + move) ----
let sel = null;    // floating selection: { cells:[{x,y,v}], dx, dy } — frame px has these source cells cleared
let lasso = null;  // active gesture: { mode:"trace", path:[...] } | { mode:"move", start:{x,y} }
function frameDisplayPx(i) { // frame pixels with the floating selection composited in (current frame only)
  const base = state.frames[i].px;

};
document.getElementById("exportPng").onclick = () => {
  commitSelection();
  const frames = gatedFrames(); if (!frames) return; // rendered from decoded CHR bytes
  const w = W(), h = H(), scale = 8, gap = 1, n = frames.length;
  const cnv = document.createElement("canvas");
  cnv.width = n * w * scale + (n - 1) * gap * scale; cnv.height = h * scale;
  const c = cnv.getContext("2d"); c.imageSmoothingEnabled = false;
  if (isTile()) { c.fillStyle = backdropColor(); c.fillRect(0, 0, cnv.width, cnv.height); } // tiles draw on the backdrop, not transparent
  frames.forEach((fr, i) => paintPixels(c, fr.px, w, h, scale, i * (w + gap) * scale, 0));
  cnv.toBlob(b => download(fname("png"), b), "image/png");
};
// Tile mode: export the arranged layout (the composed scene) as a PNG.
document.getElementById("exportMap").onclick = () => {
  commitSelection(); ensureMap();
  const frames = gatedFrames(); if (!frames) return; // stamp decoded tiles — same source of truth as png/.s
  const tw = W(), th = H(), mw = totW(), mh = totH(); // always the whole world
  const scale = Math.max(1, Math.min(8, Math.floor(8192 / Math.max(mw * tw, mh * th)))); // stay inside canvas size limits
  const cnv = document.createElement("canvas");
  cnv.width = mw * tw * scale; cnv.height = mh * th * scale;
  const c = cnv.getContext("2d"); c.imageSmoothingEnabled = false;
  c.fillStyle = backdropColor(); c.fillRect(0, 0, cnv.width, cnv.height);
  for (let cy = 0; cy < mh; cy++) for (let cx = 0; cx < mw; cx++) {
    const cell = state.map.cells[cy * mw + cx]; if (cell < 0) continue;
    const fi = cellTile(cell);
    if (fi < frames.length) paintPixels(c, frames[fi].px, tw, th, scale, cx * tw * scale, cy * th * scale);
  }
  cnv.toBlob(b => download(fname("png", "map"), b), "image/png");
};

// ---- Animated GIF export (dependency-free GIF89a, 4-color sub-palette, slot 0 transparent) ----
function hexToRgb(hexv) { const s = hexv.replace("#", ""); return [parseInt(s.slice(0, 2), 16), parseInt(s.slice(2, 4), 16), parseInt(s.slice(4, 6), 16)]; }
// GIF-variant LZW (variable-width codes, LSB-first). Returns a byte array.
function lzwEncode(indices, minCodeSize) {
  const clear = 1 << minCodeSize, end = clear + 1;
  let codeSize, dict, next;
  const reset = () => { codeSize = minCodeSize + 1; dict = new Map(); next = clear + 2; };
  const out = []; let cur = 0, curBits = 0;
  const emit = code => { cur |= code << curBits; curBits += codeSize; while (curBits >= 8) { out.push(cur & 0xFF); cur >>>= 8; curBits -= 8; } };
  reset(); emit(clear);
  let prefix = indices[0];
  for (let i = 1; i < indices.length; i++) {
    const k = indices[i], key = (prefix << 12) | k;
    if (dict.has(key)) { prefix = dict.get(key); continue; }
    emit(prefix);
    if (next === 0xFFF) { emit(clear); reset(); }
    else { if (next >= (1 << codeSize) && codeSize < 12) codeSize++; dict.set(key, next); next++; }
    prefix = k;
  }
  emit(prefix); emit(end);
  if (curBits > 0) out.push(cur & 0xFF);
  return out;
}
document.getElementById("exportGif").onclick = () => {
  commitSelection();
  const frames = gatedFrames(); if (!frames) return; // rendered from decoded CHR bytes — cannot diverge from the .s export
  const w = W(), h = H(), S = 8, gw = w * S, gh = h * S;
  // Same 60Hz tick count the .s TIMING comment documents, converted to gif centiseconds,
  // so a ROM advancing every `ticks` NMIs matches this gif.
  const delay = Math.max(2, Math.round(ticksPerFrame(state.fps) * 100 / 60));
  const b = [];
  const push = (...a) => { for (const x of a) b.push(x & 0xFF); };
  const word = v => push(v & 0xFF, (v >> 8) & 0xFF);
  const str = s => { for (let i = 0; i < s.length; i++) b.push(s.charCodeAt(i)); };
  str("GIF89a");
  word(gw); word(gh);
  push(0x80 | 0x10 | 0x01, 0x00, 0x00); // GCT flag + 4-entry table; bg index 0; aspect 0
  for (let i = 0; i < 4; i++) push(...hexToRgb(NES_PALETTE[state.palette[i]])); // global color table (4 colors)
  push(0x21, 0xFF, 0x0B); str("NETSCAPE2.0"); push(0x03, 0x01); word(0); push(0x00); // loop forever
  frames.forEach(fr => {
    push(0x21, 0xF9, 0x04, 0x09); word(delay); push(0x00, 0x00); // GCE: disposal=restore-to-bg, transparent index 0
    push(0x2C); word(0); word(0); word(gw); word(gh); push(0x00); // image descriptor (no local table)
    const idx = new Uint8Array(gw * gh);
    for (let y = 0; y < gh; y++) for (let x = 0; x < gw; x++) idx[y * gw + x] = fr.px[((y / S) | 0) * w + ((x / S) | 0)];
    push(0x02); // LZW min code size (2 bits / 4 colors)
    const lzw = lzwEncode(idx, 2);
    for (let p = 0; p < lzw.length; p += 255) { const chunk = lzw.slice(p, p + 255); push(chunk.length); for (const v of chunk) push(v); }
    push(0x00); // image data terminator
  });
  push(0x3B); // trailer
  download(fname("gif"), new Blob([new Uint8Array(b)], { type: "image/gif" }));
};

// ---- Export self-tests (automated encode->decode round-trip checks, run at boot) ----
// The synthetic art is asymmetric (so a bit- or tile-order bug can't pass by symmetry),
// uses color 3, and includes fully transparent tiles. A known-vector check pins the bit
// layout so the encoder and decoder can't both be wrong the same way. Runs in ~ms;
// failures land in the console. Also callable as nespriteSelfTest() from devtools.
function runExportSelfTests() {
  const fails = [];
  const t = (name, fn) => { try { fn(); } catch (e) { fails.push(name + ": " + e.message); } };
  const art = (tw, th, seed) => { // asymmetric, all four colors, top-left tile fully transparent
    const w = tw * 8, h = th * 8, px = new Uint8Array(w * h);
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++)
      px[y * w + x] = (x < 8 && y < 8 && tw * th > 1) ? 0 : (x * 3 + y * 5 + ((x * y + seed) % 3)) % 4;
    return px;
  };
  t("known vector", () => { // row 1,2,3,0,0,3,2,1 -> plane0 $A5, plane1 $66 (bit 7 = leftmost)
    const px = new Uint8Array(64); [1, 2, 3, 0, 0, 3, 2, 1].forEach((v, i) => px[i] = v);
    const b = frameToCHRBytes(px, 1, 1);
    if (b[0] !== 0xA5 || b[8] !== 0x66) throw new Error("row 0 encoded to " + hx(b[0]) + "," + hx(b[8]) + ", expected $A5,$66");
  });
  for (let tw = 1; tw <= 8; tw++) for (let th = 1; th <= 8; th++) // every supported size, 1-frame
    t("round-trip " + tw + "x" + th, () => roundTripFrames([{ px: art(tw, th, tw + th * 3) }], tw, th));
  t("multi-frame", () => roundTripFrames([0, 1, 2].map(i => ({ px: art(2, 2, i) })), 2, 2));
  t("fully transparent", () => roundTripFrames([{ px: new Uint8Array(256) }], 2, 2));
  if (fails.length) console.error("nes-draw export self-tests FAILED:\n" + fails.join("\n"));
  return fails.length ? fails : "all export self-tests passed";
}
window.nesDrawSelfTest = runExportSelfTests;
window.nespriteSelfTest = runExportSelfTests; // 1.0 name, kept so muscle memory still works

// ---- Boot ----
const restored = loadLocal();
loadProject(restored && (restored.sprite || restored.tile || (restored.frames && restored.frames.length)) ? restored : { mode: "sprite" });
setPlayBtn();
runExportSelfTests();

// register the service worker so the editor works fully offline
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
